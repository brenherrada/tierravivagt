<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tierra Viva Propiedades | Propiedades disponibles</title>
  <meta name="description" content="Propiedades disponibles de Tierra Viva Propiedades en Antigua Guatemala y alrededores." />
  <link rel="stylesheet" href="css/tierra-viva.css">
</head>

<body class="index-page">
  <div id="global-notice"></div>
  <script>
    fetch('./components/global-notice.html')
      .then(response => response.text())
      .then(html => {
        document.getElementById('global-notice').innerHTML = html;
      });
  </script>

  <header class="topbar">
    <a href="index.html" class="brand-link" aria-label="Ir al inicio de Tierra Viva Propiedades">
      <img
        class="brand-logo"
        src="images/logo.png"
        alt="Tierra Viva Propiedades"
      />
    </a>
  </header>

  <section class="hero" aria-labelledby="main-title">
    <div class="hero-inner">
      <h1 id="main-title">Propiedades Disponibles</h1>
    </div>
  </section>
  <main class="page">
    <section class="toolbar" aria-label="Filtros de propiedades">
      <div id="countText"><strong>3</strong> propiedades en renta</div>
      <div class="filters">
        <button class="filter-btn active" type="button" data-filter="renta">Renta</button>
        <button class="filter-btn" type="button" data-filter="venta">Venta</button>
      </div>
    </section>

    <section class="grid" id="propertyGrid" aria-label="Grilla de propiedades disponibles"></section>
  </main>
  
  <footer class="page-footer" id="footer"></footer>
  <script>
    fetch('./components/footer.html')
      .then(response => response.text())
      .then(html => {
        document.getElementById('footer').innerHTML = html;
      });
  </script>

  <script src="js/propiedades.js" defer></script>
</body>
</html>
